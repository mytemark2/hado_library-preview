name: Deploy Hado Library Preview

on:
  workflow_dispatch:
    inputs:
      app_ref:
        description: "Optional app branch/ref. Leave blank to deploy the latest feature/app-x.y.z.w branch."
        required: false
        default: ""
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-preview.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve preview source branch
        id: source
        shell: bash
        env:
          INPUT_APP_REF: ${{ github.event.inputs.app_ref || '' }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_APP_REF}" ]; then
            APP_REF="${INPUT_APP_REF}"
          else
            APP_REF="$(
              git ls-remote --heads https://github.com/mytemark2/hado_library.git 'refs/heads/feature/app-*' \
                | awk '{print $2}' \
                | sed 's#refs/heads/##' \
                | grep -E '^feature/app-[0-9]+(\.[0-9]+){3}$' \
                | sort -V \
                | tail -n 1
            )"
          fi
          test -n "${APP_REF}"
          git ls-remote --exit-code --heads https://github.com/mytemark2/hado_library.git "refs/heads/${APP_REF}" >/dev/null
          echo "app_ref=${APP_REF}" >> "${GITHUB_OUTPUT}"
          echo "Resolved preview source: ${APP_REF}"

      - name: Checkout app development branch
        uses: actions/checkout@v4
        with:
          repository: mytemark2/hado_library
          ref: ${{ steps.source.outputs.app_ref }}
          path: app

      - name: Build preview artifact
        shell: bash
        env:
          APP_REF: ${{ steps.source.outputs.app_ref }}
        run: |
          set -euo pipefail
          mkdir -p site
          cp app/index.html site/index.html
          find app -maxdepth 1 -type f -name 'hadou_*.json' -exec cp {} site/ \;
          if [ -f app/RELEASE_MANIFEST.json ]; then cp app/RELEASE_MANIFEST.json site/; fi

          DEV_LABEL="development preview"
          if [ -f app/HADO_DEV_INFO.json ]; then
            cp app/HADO_DEV_INFO.json site/HADO_DEV_INFO.json
            DEV_LABEL="$(python - <<'PY'
          import json
          with open('app/HADO_DEV_INFO.json', encoding='utf-8') as f:
              data=json.load(f)
          print(data.get('displayVersion') or 'development preview')
          PY
          )"
          fi

          python - <<'PY'
          from pathlib import Path
          import html
          import json
          p=Path('site/index.html')
          s=p.read_text(encoding='utf-8')
          label='development preview'
          info=Path('app/HADO_DEV_INFO.json')
          if info.exists():
              label=json.loads(info.read_text(encoding='utf-8')).get('displayVersion') or label
          safe=html.escape(label)
          style='''<style id="hado-preview-style">#hadoPreviewBanner{position:sticky;top:0;z-index:999999;background:#7c2d12;color:#fff;padding:8px 12px;font-weight:700;text-align:center;letter-spacing:.02em;box-shadow:0 2px 6px rgba(0,0,0,.18)}</style>'''
          banner=f'<div id="hadoPreviewBanner">Preview: {safe}</div>'
          if '</head>' in s and 'hado-preview-style' not in s:
              s=s.replace('</head>', style+'</head>', 1)
          if '<body' in s and 'hadoPreviewBanner' not in s:
              pos=s.find('>', s.find('<body'))+1
              s=s[:pos]+banner+s[pos:]
          if '<title>' in s:
              start=s.find('<title>')+7
              end=s.find('</title>', start)
              if end!=-1:
                  s=s[:start]+f'覇道ライブラリ {safe} [Preview]'+s[end:]
          p.write_text(s, encoding='utf-8')
          PY

          printf '%s\n' "Preview source: mytemark2/hado_library@${APP_REF}" > site/PREVIEW_SOURCE.txt
          printf '%s\n' "Preview label: ${DEV_LABEL}" >> site/PREVIEW_SOURCE.txt
          printf '%s\n' "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> site/PREVIEW_SOURCE.txt
          test -f site/index.html
          test "$(find site -maxdepth 1 -type f -name 'hadou_*.json' | wc -l)" -gt 0
          grep -q 'hadoPreviewBanner' site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
